<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>puzzcombinator — hunt map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Hunt map</h1>
      <p id="status">Loading…</p>
      <div id="toolbar">
        <button id="save" type="button" disabled>Save</button>
        <span id="save-status" class="muted"></span>
      </div>
    </header>
    <div id="workspace">
      <main>
        <!--
          One SVG canvas. We pre-declare an arrowhead <marker> in <defs> so every
          edge can reuse it via marker-end="url(#arrow)". app.js appends the drawn
          edges and nodes into the two <g> layers below (edges first, so nodes paint
          on top of them).
        -->
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker
              id="arrow"
              viewBox="0 0 10 10"
              refX="9"
              refY="5"
              markerWidth="7"
              markerHeight="7"
              orient="auto-start-reverse"
            >
              <path d="M0,0 L10,5 L0,10 z" class="arrowhead" />
            </marker>
          </defs>
          <g id="edge-layer"></g>
          <g id="node-layer"></g>
        </svg>
      </main>
      <!-- Details of the selected node; populated by app.js via inspector.js. -->
      <aside id="inspector">
        <p class="muted">Click a node to inspect and edit it.</p>
        <p class="muted">Edit a field, then press Save to write changes to disk.</p>
      </aside>
    </div>
    <!--
      type="module" lets the browser load app.js (and its imports) directly as an
      ES module — no bundler/build step. app.js imports render.js the same way.
    -->
    <script type="module" src="app.js"></script>
  </body>
</html>
